---

# Podman variables - for podman container hosts
pm_host_username: "ctadmin"
pm_host_usertext: "User to run podman containers"
pm_rootless_ctdir: "/home/{{ pm_host_username }}/.config/containers/systemd"

proxmox_ctr_virtio_share: "container_share"
pm_rsc_dir: "/mnt/container_resources"
# Group for access to container bulk storage
storage_groupname: "ctr-storage"

