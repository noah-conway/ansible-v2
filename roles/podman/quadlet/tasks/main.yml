# Get the UID of xadmin for systemd user scope
- name: "Get UID of {{ pm_host_username }} for systemd user scope"
  become: false
  ansible.builtin.getent:
    database: passwd
    key: "{{ pm_host_username }}"
  register: user_info

- name: debug
  ansible.builtin.debug:
    var: user_info

# Wait for user runtime directory
- name: Wait for user runtime directory
  become: false
  ansible.builtin.wait_for:
    path: "/run/user/{{ user_info.ansible_facts.getent_passwd.pm[2] }}"
    state: present
    timeout: 60

# Set runtime directory fact
- name: Set user runtime directory fact
  become: false
  ansible.builtin.set_fact:
    user_runtime_dir: "/run/user/{{ user_info.ansible_facts.getent_passwd.pm[2] }}"

- name: debug
  ansible.builtin.debug:
    msg: "Runtime dir: {{ user_runtime_dir }}"

- name: "Copying {{ container_name }} quadlet file template into remote quadlet directory"
  become: true
  #become_user: "{{ pm_host_username }}"
  ansible.builtin.template:
    src: "{{ quadlet_filename }}.j2"
    dest: "{{ pm_rootless_ctdir }}/{{ quadlet_filename }}"
    owner: "{{ pm_host_username }}" 
    group: "{{ pm_host_username }}"
    mode: '0640'

# /usr/lib/systemd/system-generators/podman-system-generator --user --dryrun


- name: "Daemon-reload"
  become: true
  become_user: "{{ pm_host_username }}"
  ansible.builtin.systemd_service:
    scope: user
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "{{ user_runtime_dir }}"

- name: "Starting systemd user"
  become: true
  become_user: "{{ pm_host_username }}"
  ansible.builtin.systemd_service:
    name: "{{ container_name }}.service"
    state: restarted
    scope: user
  environment:
    XDG_RUNTIME_DIR: "{{ user_runtime_dir }}"

