# Create user
- name: "Creating restic backup user"
  become: true
  ansible.builtin.user:
    name: "{{ backrest_user }}"
    password: '*'
    comment: "Backup user for restic and backrest"
    uid_min: '1500'
    create_home: true
    group: "{{ backrest_user }}"
    groups: "{{ storage_groupname }}"
    append: true

