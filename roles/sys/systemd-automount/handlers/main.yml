---
- name: restart-mount
  become: true
  ansible.builtin.systemd_service:
    name: "{{ unitName.stdout }}"
    state: started
    enabled: true
  when: automount != "true"

- name: restart-automount
  become: true
  ansible.builtin.systemd_service:
    name: "{{ AMunitName.stdout }}"
    state: started
    enabled: true
