---
container_name: "audiobookshelf"
container_image: "ghcr.io/advplyr/audiobookshelf"
container_version_tag: "latest"
publish_ports:
  - ext: 13378
    int: 80
    proto: 'tcp'

volumes:
  - ext: "{{ pm_rsc_dir }}/media/audiobooks"
    int: "/audiobooks"
  - ext: "/home/{{ pm_host_username }}/containers/audiobookshelf/books"
    int: "/books"
  - ext: "/home/{{ pm_host_username }}/containers/audiobookshelf/podcasts"
    int: "/podcasts"
  - ext: "/home/{{ pm_host_username }}/containers/audiobookshelf/config"
    int: "/config"
  - ext: "/home/{{ pm_host_username }}/containers/audiobookshelf/metadata"
    int: "/metadata"
    
